<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance Suite</title>
<style>
  :root {
    --bg: #0d1117; --surface: #161b22; --border: #30363d;
    --text: #e6edf3; --muted: #8b949e; --accent: #58a6ff;
    --sidebar-w: 220px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    display: flex;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  /* ── Sidebar ── */
  nav {
    width: var(--sidebar-w);
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    height: 100vh;
  }
  .nav-header {
    padding: 16px 20px 14px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .nav-header h1 { font-size: 15px; font-weight: 700; letter-spacing: -0.2px; }
  .nav-header .sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .nav-body { flex: 1; overflow-y: auto; padding: 10px 8px; }

  .nav-section {
    font-size: 10px; font-weight: 600; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.8px;
    padding: 10px 12px 4px;
  }
  .nav-item {
    display: flex; align-items: center; gap: 9px;
    padding: 8px 12px; border-radius: 6px;
    cursor: pointer; font-size: 13px; color: var(--muted);
    border: none; background: none; width: 100%; text-align: left;
    transition: background 0.15s, color 0.15s;
    margin-bottom: 1px;
  }
  .nav-item:hover { background: rgba(255,255,255,0.05); color: var(--text); }
  .nav-item.active { background: rgba(88,166,255,0.12); color: var(--accent); }
  .nav-item .icon { font-size: 14px; width: 18px; text-align: center; flex-shrink: 0; }

  /* ── Content area ── */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  .loading-bar { height: 2px; background: transparent; position: relative; flex-shrink: 0; }
  .loading-bar::after {
    content: ''; position: absolute; height: 100%; width: 0;
    background: var(--accent); transition: none;
  }
  .loading-bar.active::after {
    width: 70%;
    transition: width 8s cubic-bezier(0.1, 0.05, 0.0, 1.0);
  }
  .loading-bar.done::after {
    width: 100%;
    transition: width 0.2s ease;
  }

  iframe {
    flex: 1; border: none; width: 100%; min-height: 0;
    background: var(--bg);
  }
</style>
</head>
<body>

<nav>
  <div class="nav-header">
    <h1>Finance Suite</h1>
    <div class="sub">All trading tools</div>
  </div>
  <div class="nav-body">
    {% set last_section = namespace(v='') %}
    {% for item in nav_items %}
      {% if item.section != last_section.v %}
        <div class="nav-section">{{ item.section }}</div>
        {% set last_section.v = item.section %}
      {% endif %}
      <button class="nav-item" data-url="{{ item.url }}">
        <span class="icon">{{ item.icon }}</span>
        {{ item.label }}
      </button>
    {% endfor %}
  </div>
</nav>

<div class="main">
  <div class="loading-bar" id="loading-bar"></div>
  <iframe id="frame" src="{{ default_url }}"></iframe>
</div>

<script>
const frame        = document.getElementById('frame');
const loadingBar   = document.getElementById('loading-bar');
const navItems     = document.querySelectorAll('.nav-item');
const defaultUrl   = {{ default_url | tojson }};

function navigate(url) {
  loadingBar.classList.remove('done');
  loadingBar.classList.add('active');
  frame.src = url;
  navItems.forEach(btn => btn.classList.toggle('active', btn.dataset.url === url));
  const hash = '#' + url.replace(/^\//, '').replace(/\/$/, '');
  if (window.location.hash !== hash) history.pushState({url}, '', hash);
}

frame.addEventListener('load', () => {
  loadingBar.classList.add('done');
  setTimeout(() => loadingBar.classList.remove('active', 'done'), 300);
});

navItems.forEach(btn => {
  btn.addEventListener('click', () => navigate(btn.dataset.url));
});

// Restore from hash on load
const initUrl = window.location.hash
  ? '/' + window.location.hash.replace(/^#\/?/, '').replace(/\/$/, '') + '/'
  : defaultUrl;

// Mark active nav item
navItems.forEach(btn => btn.classList.toggle('active', btn.dataset.url === initUrl));
// iframe already set to defaultUrl; if hash differs, update
if (initUrl !== defaultUrl) frame.src = initUrl;

window.addEventListener('popstate', e => {
  if (e.state?.url) navigate(e.state.url);
});
</script>
</body>
</html>
